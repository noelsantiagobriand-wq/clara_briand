<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Papers</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <h1 id="name"></h1>

    <p id="subtitle"></p>

</header>

<nav>

    <ul>

        <li><a href="index.html">Home</a></li>
        <li><a href="papers.html" class="active">Papers</a></li>
        <li><a href="collaborators.html">Collaborators</a></li>
        <li><a href="contact.html">Contact</a></li>

    </ul>

</nav>

<main>

    <h2>Papers</h2>

    <p>
        Below is a selection of published papers and preprints.
        Use the search and filters to quickly find a paper.
    </p>

    <div class="paper-controls">

        <div class="paper-search">

            <input
                type="text"
                id="paperSearch"
                placeholder="Search papers...">

        </div>

        <!-- Automatically generated -->

        <div class="year-filters">

        </div>

        <select id="typeFilter">

            <option value="all">All Types</option>
            <option value="journal">Journal</option>
            <option value="preprint">Preprint</option>
            <option value="conference">Conference</option>
            <option value="book">Book Chapter</option>

        </select>

        <select id="sortSelect">

            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="titleAZ">Title A–Z</option>
            <option value="titleZA">Title Z–A</option>

        </select>

    </div>

    <div class="stats-grid">

        <div class="stat-card">

            <div class="stat-number" id="paperCount">0</div>

            <div class="stat-label">Papers</div>

        </div>

        <div class="stat-card">

            <div class="stat-number" id="journalCount">0</div>

            <div class="stat-label">Journal Articles</div>

        </div>

        <div class="stat-card">

            <div class="stat-number" id="preprintCount">0</div>

            <div class="stat-label">Preprints</div>

        </div>

        <div class="stat-card">

            <div class="stat-number" id="coauthorCount">0</div>

            <div class="stat-label">Coauthors</div>

        </div>

    </div>

    <div class="paper-count">

        Showing
        <span id="paperNumber">0</span>
        papers

    </div>

    <!-- Papers generated by JavaScript -->

    <div id="papersContainer">

    </div>

</main>

<footer>

    <p id="footerText"></p>

</footer>

<script src="js/profile.js"></script>
<script src="js/papers.js"></script>

</body>

</html>
